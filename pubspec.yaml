name: interview_prep_buddy
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo_new.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/logo_new.png
    - assets/images/

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7
  shared_preferences: ^2.5.3
  share_plus: ^10.1.4
  firebase_auth: ^5.7.0
  google_sign_in: ^7.2.0
  speech_to_text: ^7.3.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  file_picker: ^8.1.2
  firebase_storage: ^12.4.10
  googleapis: ^16.0.0
  http: ^1.5.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  flutter_slidable: ^3.1.1
  package_info_plus: ^8.0.0
